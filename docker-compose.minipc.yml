# docker-compose.minipc.yml — Mini-PC Split Deployment (Backend Only)
# Frontend runs on Vercel; this file runs API + DB + Redis + Cloudflare Tunnel.
#
# Usage:
#   docker compose -f docker-compose.minipc.yml up -d
#   docker compose -f docker-compose.minipc.yml logs -f
#   docker compose -f docker-compose.minipc.yml down

name: stock-dashboard-minipc

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-stockdb2026}@postgres:5432/${POSTGRES_DB:-stock_dashboard}
      REDIS_URL: redis://redis:6379
      PORT: 3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "api"
    networks:
      - app-network

  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockdb2026}
      POSTGRES_DB: ${POSTGRES_DB:-stock_dashboard}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    command: >
      postgres
        -c shared_buffers=1GB
        -c effective_cache_size=3GB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_wal_size=2GB
        -c min_wal_size=1GB
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c log_statement=ddl
        -c log_temp_files=0
        -c timescaledb.max_background_workers=4
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        tag: "postgres"
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 21600 1
        --save 3600 100
        --save 300 10000
        --loglevel notice
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "redis"
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "cloudflared"
    networks:
      - app-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  app-network:
    driver: bridge
